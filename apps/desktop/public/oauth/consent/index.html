<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CrowByte - Sign In</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #030308; color: #e4e4e7;
      font-family: 'JetBrains Mono', 'SF Mono', 'Fira Code', monospace;
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
    }
    .container { max-width: 400px; width: 100%; padding: 2rem; }
    .card {
      background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06);
      border-radius: 16px; padding: 2rem;
    }
    .logo { text-align: center; margin-bottom: 1.5rem; }
    .logo h1 {
      font-size: 1.5rem;
      background: linear-gradient(135deg, #3b82f6, #f97316);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .logo p { color: #71717a; font-size: 0.75rem; margin-top: 0.25rem; }
    .info { text-align: center; margin-bottom: 1.5rem; padding-bottom: 1.5rem; border-bottom: 1px solid rgba(255,255,255,0.06); }
    .info h2 { font-size: 1.1rem; margin-bottom: 0.5rem; }
    .info p { color: #a1a1aa; font-size: 0.8rem; }
    .form-group { margin-bottom: 0.75rem; }
    .form-group label {
      display: block; font-size: 0.7rem; color: #71717a; margin-bottom: 0.25rem;
      text-transform: uppercase; letter-spacing: 0.05em;
    }
    .form-group input {
      width: 100%; padding: 0.6rem 0.75rem; background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1); border-radius: 8px;
      color: #e4e4e7; font-family: inherit; font-size: 0.85rem; outline: none;
    }
    .form-group input:focus { border-color: #3b82f6; }
    .btn {
      display: block; width: 100%; padding: 0.75rem; border: none;
      border-radius: 9999px; font-family: inherit; font-size: 0.85rem;
      font-weight: 600; cursor: pointer; text-align: center; transition: all 0.2s;
      margin-top: 1rem;
    }
    .btn-primary { background: #3b82f6; color: white; }
    .btn-primary:hover { background: #2563eb; }
    .loading { opacity: 0.5; pointer-events: none; }
    .status { text-align: center; font-size: 0.75rem; margin-top: 0.75rem; min-height: 1.2em; }
    .status.ok { color: #22c55e; }
    .status.err { color: #ef4444; }
    .status.info { color: #71717a; }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <div class="logo">
        <h1>CrowByte</h1>
        <p>AI-Powered Security Platform</p>
      </div>
      <div class="info">
        <h2>Sign In to Desktop App</h2>
        <p>Enter your credentials to activate the desktop client.</p>
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="email" placeholder="you@example.com" autocomplete="email" autofocus>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="Password" autocomplete="current-password">
      </div>
      <button id="login-btn" class="btn btn-primary" onclick="login()">Sign In</button>
      <div id="status" class="status"></div>
    </div>
  </div>

  <script>
    var API = 'https://gvskdopsigtflbbylyto.supabase.co/auth/v1';
    var KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imd2c2tkb3BzaWd0ZmxiYnlseXRvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjMzMTIzMDUsImV4cCI6MjA3ODg4ODMwNX0.eQP8nS41MQy8J6dFYUwBjwupBdcxeAAeOUcAlK1m_Xs';
    var PORT = 19876;
    var statusEl = document.getElementById('status');

    function setStatus(msg, type) {
      statusEl.textContent = msg;
      statusEl.className = 'status ' + (type || 'info');
    }

    async function login() {
      var email = document.getElementById('email').value.trim();
      var password = document.getElementById('password').value;
      if (!email || !password) { setStatus('Enter email and password.', 'err'); return; }

      var btn = document.getElementById('login-btn');
      btn.textContent = 'Signing in...';
      btn.classList.add('loading');
      setStatus('', 'info');

      try {
        var res = await fetch(API + '/token?grant_type=password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'apikey': KEY },
          body: JSON.stringify({ email: email, password: password }),
        });

        var data = await res.json();

        if (!res.ok || !data.access_token) {
          setStatus(data.error_description || data.msg || data.error || 'Login failed', 'err');
          btn.textContent = 'Sign In';
          btn.classList.remove('loading');
          return;
        }

        setStatus('Authenticated! Redirecting to desktop app...', 'ok');

        // Hand tokens to Electron's localhost callback server
        window.location.href = 'http://localhost:' + PORT + '/auth/callback'
          + '?access_token=' + encodeURIComponent(data.access_token)
          + '&refresh_token=' + encodeURIComponent(data.refresh_token);

      } catch (err) {
        setStatus(err.message, 'err');
        btn.textContent = 'Sign In';
        btn.classList.remove('loading');
      }
    }

    document.getElementById('password').addEventListener('keydown', function(e) { if (e.key === 'Enter') login(); });
    document.getElementById('email').addEventListener('keydown', function(e) { if (e.key === 'Enter') document.getElementById('password').focus(); });
  </script>
</body>
</html>
