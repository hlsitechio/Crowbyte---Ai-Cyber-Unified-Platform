###############################################################################
# CrowByte — Desktop Release Builder
#
# Triggers: version tags (v*) or manual dispatch
# Builds: .AppImage (Linux), .deb (Linux), .exe NSIS (Windows), .dmg (macOS)
# Publishes: GitHub Releases with all artifacts
###############################################################################

name: Desktop Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., 2.0.0)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  # ─── Build Matrix ──────────────────────────────────────────────────────────
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
            artifact: crowbyte-linux
          - os: windows-latest
            platform: win
            artifact: crowbyte-windows
          - os: macos-latest
            platform: mac
            artifact: crowbyte-macos

    runs-on: ${{ matrix.os }}
    name: Build (${{ matrix.platform }})

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/desktop/package.json

      - name: Install dependencies
        working-directory: apps/desktop
        run: npm install --legacy-peer-deps

      - name: Build Vite (Electron)
        working-directory: apps/desktop
        run: npm run build:vite
        env:
          VITE_BUILD_TARGET: electron
          VITE_PLATFORM: ${{ matrix.platform == 'win' && 'windows' || matrix.platform == 'mac' && 'macos' || 'linux' }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: Build Electron (Linux)
        if: matrix.platform == 'linux'
        working-directory: apps/desktop
        run: npx electron-builder --linux AppImage deb
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Electron (Windows)
        if: matrix.platform == 'win'
        working-directory: apps/desktop
        run: npx electron-builder --win nsis msi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Electron (macOS)
        if: matrix.platform == 'mac'
        working-directory: apps/desktop
        run: npx electron-builder --mac dmg
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            apps/desktop/release/*.AppImage
            apps/desktop/release/*.deb
            apps/desktop/release/*.exe
            apps/desktop/release/*.msi
            apps/desktop/release/*.dmg
            apps/desktop/release/*.yml
          if-no-files-found: warn

  # ─── Create GitHub Release ─────────────────────────────────────────────────
  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: List artifacts
        run: find release-artifacts -type f | sort

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-artifacts/**/*
          draft: false
          prerelease: false
          generate_release_notes: true

  # ─── Backup to VPS ─────────────────────────────────────────────────────────
  backup:
    needs: release
    runs-on: [self-hosted, linux, x64, crowbyte]
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    name: Backup to VPS

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Get version tag
        id: version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            echo "tag=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Archive to VPS
        env:
          RELEASE_TAG: ${{ steps.version.outputs.tag }}
        run: |
          BACKUP_DIR="/opt/crowbyte/releases/${RELEASE_TAG}"
          mkdir -p "${BACKUP_DIR}"
          cp -r release-artifacts/* "${BACKUP_DIR}/"
          echo "[+] Backed up to ${BACKUP_DIR}"
          ls -lh "${BACKUP_DIR}/"
          # Keep a latest symlink
          ln -sfn "${BACKUP_DIR}" /opt/crowbyte/releases/latest
