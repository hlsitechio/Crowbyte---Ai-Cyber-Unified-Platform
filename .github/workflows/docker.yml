###############################################################################
# CrowByte — Docker Build & Push
#
# Triggers: version tags (v*), manual dispatch
# Builds: Linux (amd64) on self-hosted VPS runner (162GB disk)
# Registry: GHCR (ghcr.io/hlsitechio/crowbyte)
###############################################################################

name: Docker Build & Push

on:
  push:
    tags: ['v*']
  workflow_dispatch:

env:
  GHCR_REPO: ghcr.io/hlsitechio/crowbyte

jobs:
  build-linux:
    runs-on: [self-hosted, linux, x64, crowbyte]
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.GHCR_REPO }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VITE_BUILD_TARGET=electron
            VITE_PLATFORM=linux
          cache-from: type=registry,ref=${{ env.GHCR_REPO }}:buildcache
          cache-to: type=registry,ref=${{ env.GHCR_REPO }}:buildcache,mode=max

      - name: Cleanup
        if: always()
        run: docker system prune -f --filter "until=24h"
