###############################################################################
# CrowByte Terminal — Docker Build & Push
#
# Triggers: push to main, version tags (v*)
# Builds: Linux (amd64 + arm64), Windows (amd64)
# Registries: Docker Hub (hlsitech/crowbyte), GHCR (ghcr.io/hlsitechio/crowbyte)
###############################################################################

name: Docker Build & Push

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:
    inputs:
      platforms:
        description: 'Target platforms'
        required: false
        default: 'linux'
        type: choice
        options:
          - linux
          - windows
          - all

env:
  DOCKERHUB_REPO: hlsitech/crowbyte
  GHCR_REPO: ghcr.io/hlsitechio/crowbyte

jobs:
  # ─── Linux Multi-Arch Build ────────────────────────────────────────────────
  build-linux:
    runs-on: ubuntu-latest
    if: >-
      github.event_name != 'workflow_dispatch' ||
      github.event.inputs.platforms != 'windows'
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.DOCKERHUB_REPO }}
            ${{ env.GHCR_REPO }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push (Linux)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Update Docker Hub description
        uses: peter-evans/dockerhub-description@v4
        if: github.ref == 'refs/heads/main'
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: hlsitech/crowbyte
          short-description: "CrowByte Terminal — Offensive Security Command Center"

  # ─── Windows Build ─────────────────────────────────────────────────────────
  build-windows:
    runs-on: windows-2022
    if: >-
      contains(github.ref, 'refs/tags/v') ||
      (github.event_name == 'workflow_dispatch' &&
       github.event.inputs.platforms != 'linux')
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push (Windows)
        env:
          DH_REPO: ${{ env.DOCKERHUB_REPO }}
          GH_REPO: ${{ env.GHCR_REPO }}
        run: |
          docker build -t "${env:DH_REPO}:windows" -f Dockerfile.windows .
          docker tag "${env:DH_REPO}:windows" "${env:GH_REPO}:windows"
          docker push "${env:DH_REPO}:windows"
          docker push "${env:GH_REPO}:windows"
